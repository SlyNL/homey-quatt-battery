<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 250 175" width="250" height="175">
  <defs>
    <linearGradient id="tower" x1="0" y1="0" x2="0.12" y2="1">
      <stop offset="0%" stop-color="#b8ccc0"/>
      <stop offset="100%" stop-color="#9cb0a6"/>
    </linearGradient>
    <linearGradient id="side" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#86a098"/>
      <stop offset="100%" stop-color="#9cb0a6"/>
    </linearGradient>
  </defs>

  <!-- White background -->
  <rect width="250" height="175" fill="#ffffff"/>

  <!-- Floor shadow -->
  <ellipse cx="125" cy="163" rx="44" ry="5" fill="#00000010"/>

  <!-- Side depth -->
  <path d="M153 8 L161 15 L161 155 L153 148 Z" fill="url(#side)" opacity="0.5"/>

  <!-- Module 1 top -->
  <rect x="93" y="5"   width="60" height="47" rx="7" fill="url(#tower)" stroke="#94aca2" stroke-width="1"/>
  <!-- Module 2 middle -->
  <rect x="93" y="57"  width="60" height="46" rx="7" fill="url(#tower)" stroke="#94aca2" stroke-width="1"/>
  <!-- Module 3 bottom -->
  <rect x="93" y="108" width="60" height="44" rx="7" fill="url(#tower)" stroke="#94aca2" stroke-width="1"/>

  <!-- Seam gaps -->
  <rect x="95" y="52"  width="56" height="6" rx="2" fill="#ffffff" opacity="0.6"/>
  <rect x="95" y="103" width="56" height="6" rx="2" fill="#ffffff" opacity="0.6"/>

  <!-- Control panel -->
  <rect x="101" y="12" width="44" height="28" rx="4" fill="#18221e" opacity="0.9"/>
  <rect x="105" y="16" width="36" height="15" rx="3" fill="#223028"/>
  <rect x="109" y="20" width="22" height="5"  rx="2.5" fill="#3DBA89"/>
  <rect x="109" y="27" width="14" height="3"  rx="1.5" fill="#3DBA89" opacity="0.5"/>
  <circle cx="137" cy="34" r="3.5" fill="#3DBA89"/>
  <circle cx="137" cy="34" r="5.5" fill="#3DBA89" opacity="0.2"/>

  <!-- Base feet -->
  <rect x="97"  cy="152" y="152" width="16" height="6" rx="3" fill="#8aa29a"/>
  <rect x="137" cy="152" y="152" width="16" height="6" rx="3" fill="#8aa29a"/>
</svg>
