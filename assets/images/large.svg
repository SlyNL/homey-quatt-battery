<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 350" width="500" height="350">
  <defs>
    <linearGradient id="wall" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0%" stop-color="#f0ece6"/>
      <stop offset="100%" stop-color="#e6dfd6"/>
    </linearGradient>
    <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ddd7ce"/>
      <stop offset="100%" stop-color="#d0c9bf"/>
    </linearGradient>
    <linearGradient id="tower" x1="0" y1="0" x2="0.12" y2="1">
      <stop offset="0%" stop-color="#b4c8bc"/>
      <stop offset="100%" stop-color="#9eb4a8"/>
    </linearGradient>
    <linearGradient id="side" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#86a098"/>
      <stop offset="100%" stop-color="#9eb4a8"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="6" dy="4" stdDeviation="10" flood-color="#00000020"/>
    </filter>
  </defs>

  <!-- Wall -->
  <rect width="500" height="350" fill="url(#wall)"/>

  <!-- Warm sunlight patch -->
  <ellipse cx="420" cy="160" rx="160" ry="180" fill="#fff8ef" opacity="0.3"/>

  <!-- Floor -->
  <rect x="0" y="296" width="500" height="54" fill="url(#floor)"/>
  <line x1="0" y1="296" x2="500" y2="296" stroke="#c8c2b8" stroke-width="1.5"/>
  <rect x="0" y="289" width="500" height="8" fill="#dedad2"/>

  <!-- Plant (left) -->
  <ellipse cx="82" cy="290" rx="22" ry="6" fill="#c0b8ac" opacity="0.5"/>
  <rect x="68" y="276" width="28" height="17" rx="4" fill="#c4b090"/>
  <path d="M82 276 Q74 252 60 236" stroke="#5a8f62" stroke-width="3" stroke-linecap="round" fill="none"/>
  <path d="M82 272 Q88 244 106 228" stroke="#5a8f62" stroke-width="3" stroke-linecap="round" fill="none"/>
  <path d="M82 270 Q80 254 70 242" stroke="#5a8f62" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <ellipse cx="58"  cy="230" rx="20" ry="9" fill="#4e8058" transform="rotate(-30 58 230)"/>
  <ellipse cx="108" cy="224" rx="24" ry="10" fill="#5a8f62" transform="rotate(25 108 224)"/>
  <ellipse cx="69"  cy="240" rx="16" ry="8"  fill="#6aaa70" transform="rotate(-15 69 240)"/>

  <!-- Tower shadow -->
  <ellipse cx="250" cy="316" rx="58" ry="9" fill="#00000018"/>

  <!-- Right side depth -->
  <path d="M296 22 L312 34 L312 298 L296 286 Z" fill="url(#side)" opacity="0.55"/>

  <!-- Device shadow -->
  <rect x="196" y="18" width="104" height="276" rx="10" fill="#00000014" filter="url(#shadow)"/>

  <!-- Module 1 – top -->
  <rect x="192" y="14"  width="104" height="90" rx="10" fill="url(#tower)" stroke="#90a89e" stroke-width="1.2"/>
  <!-- Module 2 – middle -->
  <rect x="192" y="112" width="104" height="88" rx="10" fill="url(#tower)" stroke="#90a89e" stroke-width="1.2"/>
  <!-- Module 3 – bottom -->
  <rect x="192" y="208" width="104" height="86" rx="10" fill="url(#tower)" stroke="#90a89e" stroke-width="1.2"/>

  <!-- Seam gaps -->
  <rect x="197" y="103" width="94" height="10" rx="2" fill="#ede7de" opacity="0.7"/>
  <rect x="197" y="199" width="94" height="10" rx="2" fill="#ede7de" opacity="0.7"/>

  <!-- Control panel – top module -->
  <rect x="206" y="26" width="76" height="46" rx="5" fill="#1c2820" opacity="0.88"/>
  <rect x="210" y="30" width="68" height="26" rx="3" fill="#223028"/>
  <rect x="214" y="35" width="46" height="6"  rx="3" fill="#2e2e2e"/>
  <rect x="214" y="35" width="36" height="6"  rx="3" fill="#3DBA89"/>
  <rect x="214" y="44" width="26" height="4"  rx="2" fill="#3DBA89" opacity="0.5"/>
  <circle cx="272" cy="60" r="4.5" fill="#3DBA89"/>
  <circle cx="272" cy="60" r="7"   fill="#3DBA89" opacity="0.2"/>

  <!-- Quatt wordmark -->
  <text x="244" y="90" font-family="'Arial Black', Arial, sans-serif" font-size="11" font-weight="900" fill="#3a5048" text-anchor="middle" letter-spacing="4" opacity="0.65">QUATT</text>

  <!-- Vent lines module 2 -->
  <g stroke="#8aa29a" stroke-width="1" opacity="0.5">
    <line x1="202" y1="140" x2="284" y2="140"/>
    <line x1="202" y1="152" x2="284" y2="152"/>
    <line x1="202" y1="164" x2="284" y2="164"/>
    <line x1="202" y1="176" x2="284" y2="176"/>
  </g>

  <!-- Vent lines module 3 -->
  <g stroke="#8aa29a" stroke-width="1" opacity="0.5">
    <line x1="202" y1="234" x2="284" y2="234"/>
    <line x1="202" y1="246" x2="284" y2="246"/>
    <line x1="202" y1="258" x2="284" y2="258"/>
    <line x1="202" y1="270" x2="284" y2="270"/>
  </g>

  <!-- Base feet -->
  <rect x="202" y="294" width="26" height="8" rx="4" fill="#8ca89c"/>
  <rect x="258" y="294" width="26" height="8" rx="4" fill="#8ca89c"/>
</svg>
