<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="wall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0ece6"/>
      <stop offset="100%" stop-color="#e4ddd5"/>
    </linearGradient>
    <linearGradient id="tower" x1="0" y1="0" x2="0.2" y2="1">
      <stop offset="0%" stop-color="#b4c8bc"/>
      <stop offset="100%" stop-color="#9eb4a8"/>
    </linearGradient>
  </defs>

  <rect width="64" height="64" rx="12" fill="url(#wall)"/>

  <!-- Floor -->
  <rect x="0" y="52" width="64" height="12" rx="0" fill="#ddd7ce"/>
  <line x1="0" y1="52" x2="64" y2="52" stroke="#cac4ba" stroke-width="1"/>

  <!-- Tower shadow -->
  <ellipse cx="32" cy="54" rx="14" ry="3" fill="#00000015"/>

  <!-- Module 3 bottom -->
  <rect x="20" y="38" width="24" height="15" rx="3" fill="url(#tower)" stroke="#90a89e" stroke-width="0.8"/>
  <!-- Module 2 middle -->
  <rect x="20" y="22" width="24" height="14" rx="3" fill="url(#tower)" stroke="#90a89e" stroke-width="0.8"/>
  <!-- Module 1 top -->
  <rect x="20" y="7" width="24" height="13" rx="3" fill="url(#tower)" stroke="#90a89e" stroke-width="0.8"/>

  <!-- Seam gaps -->
  <rect x="21" y="20" width="22" height="3" rx="1" fill="#ede7de" opacity="0.8"/>
  <rect x="21" y="36" width="22" height="3" rx="1" fill="#ede7de" opacity="0.8"/>

  <!-- Control panel top -->
  <rect x="23" y="10" width="18" height="8" rx="2" fill="#1c2820" opacity="0.85"/>
  <circle cx="36" cy="16" r="1.5" fill="#3DBA89"/>
</svg>
