<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1f2e"/>
      <stop offset="100%" stop-color="#1a3a4a"/>
    </linearGradient>
    <linearGradient id="charge" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#00b894"/>
      <stop offset="100%" stop-color="#00d4aa"/>
    </linearGradient>
  </defs>
  <rect width="500" height="500" rx="80" fill="url(#bg)"/>
  <!-- Battery body -->
  <rect x="140" y="110" width="220" height="300" rx="24" fill="none" stroke="#00d4aa" stroke-width="12"/>
  <!-- Battery terminal -->
  <rect x="200" y="86" width="100" height="34" rx="12" fill="#00d4aa"/>
  <!-- Charge fill -->
  <rect x="152" y="230" width="196" height="168" rx="14" fill="url(#charge)" opacity="0.9"/>
  <!-- Lightning bolt -->
  <path d="M275 175l-50 90h42l-22 80 70-110h-46z" fill="#ffffff" opacity="0.95"/>
  <!-- Brand text -->
  <text x="250" y="446" font-family="'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="700" fill="#00d4aa" text-anchor="middle" letter-spacing="6">QUATT</text>
</svg>